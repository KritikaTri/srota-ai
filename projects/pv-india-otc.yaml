id: pv-india-otc
name: India OTC Pharmacovigilance
keywords:
- Crocin
- Dolo
- Telma
- Ecosprin
- rash
- lactic acidosis
- myalgia
sources:
- name: reddit-r-india
  connector: reddit
  params:
    subreddits:
    - india
    - AskDocs
    limit: 200
  latency: real_time
  time_window:
    lookback_days: 3
    since: null
    until: null
  enabled: true
- name: fda-recalls-rss
  connector: rss
  params:
    feed_url: https://www.fda.gov/about-fda/contact-fda/stay-informed/rss-feeds/drugs/rss.xml
  latency: daily
  time_window: null
  enabled: true
- name: 1mg-reviews
  connector: html_stealth
  params:
    url: https://www.1mg.com/drugs/crocin-advance-tablet-130257
    list_selector: div.review-item
    title_selector: p.review-text
    body_selector: p.review-text
    link_selector: a
  latency: daily
  time_window: null
  enabled: false
- name: openfda-metformin
  connector: openfda
  params:
    search: patient.drug.medicinalproduct:METFORMIN
    limit: 600
    per_page: 100
    sort: receivedate:desc
  latency: daily
  time_window:
    lookback_days: 2000
    since: null
    until: null
  enabled: true
description: Monitor common Indian OTC drugs for adverse reactions.
time_window:
  lookback_days: 14
  since: null
  until: null
