id: opioid-safety-monitor
name: Opioid Safety Monitor
description: Monitor prescription opioid analgesics for adverse drug reactions,
  diversion / misuse signals, and emergent safety alerts across social,
  regulatory, and pharmacovigilance feeds.
keywords:
# --- molecules / generics ---
- tramadol
- oxycodone
- hydrocodone
- codeine
- morphine
- fentanyl
- buprenorphine
- methadone
- tapentadol
# --- Indian / global brands ---
- Tramazac
- Ultracet
- OxyContin
- Vicodin
- Percocet
- Suboxone
- Spasmoproxyvon
# --- adverse events of interest ---
- respiratory depression
- overdose
- naloxone
- constipation
- sedation
- dependence
- withdrawal
- nausea
- dizziness
- hyperalgesia
sources:
# 1. Reddit — patient communities discussing opioid therapy + harm reduction
- name: reddit-opioids
  connector: reddit
  params:
    subreddits:
    - opiates
    - PainManagement
    - AskDocs
    - ChronicPain
    limit: 250
  latency: real_time
  time_window:
    lookback_days: 5
    since: null
    until: null
  enabled: true

# 2. RSS — FDA Drug Safety / Recalls feed (catches REMS updates, label changes)
- name: fda-drug-safety-rss
  connector: rss
  params:
    feed_url: https://www.fda.gov/about-fda/contact-fda/stay-informed/rss-feeds/drugs/rss.xml
  latency: daily
  time_window: null
  enabled: true

# 3. FAERS — synthetic disproportionality input (real opendata in prod)
- name: faers-opioids
  connector: faers
  params:
    synthetic: true
  latency: weekly
  time_window:
    lookback_days: 900
    since: null
    until: null
  enabled: true

# 4. HTML stealth — 1mg consumer review page for a high-volume opioid SKU.
#    Enabled to exercise the stealth path; selectors may need tuning if the
#    site DOM shifts. Falls back gracefully (fetched=0) on any parse miss.
- name: 1mg-tramadol-reviews
  connector: html_stealth
  params:
    url: https://www.1mg.com/drugs/tramadol-50mg-capsule-307530
    list_selector: div.review-item
    title_selector: p.review-text
    body_selector: p.review-text
    link_selector: a
  latency: daily
  time_window: null
  enabled: true

# 5. X / Twitter — real-time chatter; falls back to fixture without TWITTERAPI_IO_KEY
- name: x-opioids
  connector: x
  params:
    query: (tramadol OR oxycodone OR fentanyl OR buprenorphine OR naloxone)
      (overdose OR "respiratory depression" OR withdrawal OR dependence) lang:en
    max_results: 50
  latency: real_time
  time_window:
    lookback_days: 7
    since: null
    until: null
  enabled: true
time_window:
  lookback_days: 14
  since: null
  until: null
