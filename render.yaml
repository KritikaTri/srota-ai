services:
  - type: web
    name: srotaai
    runtime: python
    buildCommand: pip install -r requirements.txt && cp srotaai_seed.db srotaai.db
    startCommand: uvicorn srotaai.web.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
    disk:
      name: srotaai-data
      mountPath: /opt/render/project/src
      sizeGB: 1
